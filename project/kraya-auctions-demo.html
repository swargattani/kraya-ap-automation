document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d94ee52d-239d-4549-9e78-6bb6858d1865\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"afb69370-6785-4ec1-966c-06c3f7abafa6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"72ac43e3-c9b9-4cdf-860e-714aa274b49e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ─── Brand ─────────────────────────────────────────────────────── */\n  --kraya-red:           #D8261C;     /* primary brand red */\n  --kraya-red-hover:     #B81E15;     /* darken ~8% */\n  --kraya-red-press:     #9C170F;\n  --kraya-red-soft:      #FBE9E7;     /* tinted backgrounds */\n  --kraya-red-tint:      #F5C5C1;     /* chip backgrounds */\n\n  --kraya-ink:           #1A1614;     /* near-black, warm */\n  --kraya-ink-2:         #2B2522;\n  --kraya-paper:         #FAF7F2;     /* page canvas, cream-tinted */\n  --kraya-paper-2:       #F4EFE7;     /* sunken surfaces */\n  --kraya-white:         #FFFFFF;\n\n  /* ─── Neutrals (warm-leaning) ───────────────────────────────────── */\n  --neutral-900: #1A1614;\n  --neutral-800: #2B2522;\n  --neutral-700: #443B36;\n  --neutral-600: #5F544D;\n  --neutral-500: #847870;\n  --neutral-400: #ADA399;\n  --neutral-300: #D0C8BE;\n  --neutral-200: #E5DED4;\n  --neutral-100: #F0EAE0;\n  --neutral-50:  #FAF7F2;\n\n  /* ─── Foreground / background tokens ────────────────────────────── */\n  --fg-1: var(--neutral-900);   /* primary text */\n  --fg-2: var(--neutral-700);   /* secondary text */\n  --fg-3: var(--neutral-500);   /* tertiary / placeholder */\n  --fg-inverse: var(--kraya-white);\n\n  --bg-canvas:  var(--kraya-paper);\n  --bg-surface: var(--kraya-white);\n  --bg-subtle:  var(--neutral-100);\n  --bg-muted:   var(--neutral-200);\n  --bg-dark:    var(--neutral-900);\n\n  --border-subtle:  var(--neutral-200);\n  --border-default: var(--neutral-300);\n  --border-strong:  var(--neutral-500);\n\n  /* ─── Semantic ──────────────────────────────────────────────────── */\n  --success:        #2E7D5B;\n  --success-soft:   #E4F1EA;\n  --warning:        #B5731A;\n  --warning-soft:   #FAEFD9;\n  --danger:         #C0392B;\n  --danger-soft:    #FBE9E7;\n  --info:           #2E6FAE;\n  --info-soft:      #E4EEF7;\n\n  /* ─── Type ──────────────────────────────────────────────────────── */\n  --font-sans:    \"DM Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  --font-mono:    \"IBM Plex Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n  --font-display: var(--font-sans);\n\n  /* Scale */\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-md:   18px;\n  --text-lg:   20px;\n  --text-xl:   24px;\n  --text-2xl:  32px;\n  --text-3xl:  40px;\n  --text-4xl:  56px;\n  --text-5xl:  72px;\n\n  --leading-tight: 1.1;\n  --leading-snug:  1.25;\n  --leading-base:  1.5;\n  --leading-loose: 1.7;\n\n  --tracking-tight: -0.02em;\n  --tracking-snug:  -0.01em;\n  --tracking-base:  0;\n  --tracking-wide:  0.06em;\n\n  /* ─── Spacing (4px base) ────────────────────────────────────────── */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* ─── Radii ─────────────────────────────────────────────────────── */\n  --radius-xs:   4px;\n  --radius-sm:   6px;\n  --radius-md:   8px;\n  --radius-lg:   12px;\n  --radius-xl:   16px;\n  --radius-pill: 999px;\n\n  /* ─── Shadow (soft, low, warm-tinted) ───────────────────────────── */\n  --shadow-1: 0 1px 2px rgba(15, 12, 10, 0.06);\n  --shadow-2: 0 4px 12px -2px rgba(15, 12, 10, 0.08), 0 1px 2px rgba(15, 12, 10, 0.04);\n  --shadow-3: 0 12px 32px -8px rgba(15, 12, 10, 0.14), 0 2px 6px rgba(15, 12, 10, 0.05);\n  --shadow-4: 0 32px 64px -16px rgba(15, 12, 10, 0.20), 0 4px 12px rgba(15, 12, 10, 0.06);\n\n  /* ─── Motion ────────────────────────────────────────────────────── */\n  --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);\n  --ease-in-out: cubic-bezier(0.6, 0, 0.4, 1);\n  --dur-fast:   150ms;\n  --dur-base:   220ms;\n  --dur-slow:   320ms;\n}\n\n/* ──────────────────────────────────────────────────────────────────────\n   Semantic element styles — use directly on bare HTML or as CSS classes\n   ────────────────────────────────────────────────────────────────────── */\n.kraya-root,\nbody.kraya {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n  background: var(--bg-canvas);\n  font-size: var(--text-base);\n  line-height: var(--leading-base);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.kraya-root h1, .kraya h1, .kraya-h1 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--text-4xl);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--fg-1);\n  text-wrap: balance;\n  margin: 0 0 var(--space-6);\n}\n.kraya-root h2, .kraya h2, .kraya-h2 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: var(--text-3xl);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--fg-1);\n  margin: 0 0 var(--space-5);\n}\n.kraya-root h3, .kraya h3, .kraya-h3 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--text-2xl);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-snug);\n  color: var(--fg-1);\n  margin: 0 0 var(--space-4);\n}\n.kraya-root h4, .kraya h4, .kraya-h4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--text-xl);\n  line-height: var(--leading-snug);\n  color: var(--fg-1);\n  margin: 0 0 var(--space-3);\n}\n.kraya-root h5, .kraya h5, .kraya-h5 {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--text-md);\n  line-height: var(--leading-snug);\n  color: var(--fg-1);\n  margin: 0 0 var(--space-2);\n}\n\n.kraya-root p, .kraya p, .kraya-body {\n  font-size: var(--text-base);\n  line-height: var(--leading-base);\n  color: var(--fg-2);\n  margin: 0 0 var(--space-4);\n}\n\n.kraya-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--text-xs);\n  font-weight: 600;\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  color: var(--kraya-red);\n}\n\n.kraya-label {\n  font-family: var(--font-sans);\n  font-size: var(--text-sm);\n  font-weight: 500;\n  color: var(--fg-2);\n}\n\n.kraya-mono, code, kbd, samp {\n  font-family: var(--font-mono);\n  font-size: 0.95em;\n  background: var(--bg-subtle);\n  border: 1px solid var(--border-subtle);\n  border-radius: var(--radius-xs);\n  padding: 0.1em 0.4em;\n}\n\n.kraya-num {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: \"tnum\";\n}\n\n.kraya-link, a.kraya {\n  color: var(--kraya-red);\n  text-decoration: none;\n  border-bottom: 1px solid transparent;\n  transition: border-color var(--dur-fast) var(--ease-out);\n}\n.kraya-link:hover, a.kraya:hover {\n  border-bottom-color: currentColor;\n}\n<\u002Fstyle>\n<style>/* ──────────────────────────────────────────────────────────────────────\n   Kraya Auctions — module-specific tokens, layered on colors_and_type.css\n   Import AFTER colors_and_type.css.\n   ────────────────────────────────────────────────────────────────────── */\n\n:root {\n  /* Status colors (reuse semantic palette + add an \"auction-live\" accent\n     that's distinct from generic danger red) */\n  --auction-live:      #D8261C;   /* === kraya-red, used pulsing for live  */\n  --auction-live-soft: #FBE9E7;\n  --auction-extended:  #B5731A;   /* === warning, used for extension banners */\n  --auction-closing:   #C0392B;   /* === danger, last-60s pulse */\n  --auction-awarded:   #2E7D5B;   /* === success */\n  --auction-setup:     #5F544D;   /* === neutral-600, draft */\n\n  /* Rank colors (1st/2nd/3rd + others) */\n  --rank-1-bg:  #FBE9E7;\n  --rank-1-fg:  #D8261C;\n  --rank-2-bg:  #FAEFD9;\n  --rank-2-fg:  #B5731A;\n  --rank-3-bg: #E4EEF7;\n  --rank-3-fg: #2E6FAE;\n  --rank-n-bg:  #F0EAE0;\n  --rank-n-fg:  #5F544D;\n}\n\n/* ─── Pulsing dot (used in \"LIVE\" indicators) ────────────────────────── */\n.kx-live-dot {\n  width: 8px; height: 8px; border-radius: 999px;\n  background: var(--auction-live);\n  box-shadow: 0 0 0 0 var(--auction-live);\n  animation: kx-pulse 1.6s ease-out infinite;\n  flex-shrink: 0;\n}\n@keyframes kx-pulse {\n  0%   { box-shadow: 0 0 0 0 rgba(216, 38, 28, 0.5); }\n  100% { box-shadow: 0 0 0 10px rgba(216, 38, 28, 0); }\n}\n\n/* ─── Countdown timer block ──────────────────────────────────────────── */\n.kx-timer {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: \"tnum\";\n  letter-spacing: 0.02em;\n  display: inline-flex;\n  align-items: baseline;\n  gap: 4px;\n}\n.kx-timer .seg { color: var(--fg-1); font-weight: 600; }\n.kx-timer .sep { color: var(--fg-3); font-weight: 400; }\n.kx-timer.warn .seg { color: var(--auction-extended); }\n.kx-timer.danger .seg { color: var(--auction-closing); animation: kx-tick 1s steps(2) infinite;}\n@keyframes kx-tick {\n  0%, 50% { opacity: 1; }\n  51%, 100% { opacity: 0.55; }\n}\n\n/* ─── Rank pill (1, 2, 3, n) ─────────────────────────────────────────── */\n.kx-rank {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 28px; height: 28px; border-radius: 999px;\n  font: 700 12px/1 var(--font-sans); flex-shrink: 0;\n  background: var(--rank-n-bg); color: var(--rank-n-fg);\n  border: 1.5px solid transparent;\n}\n.kx-rank.r1 { background: var(--rank-1-bg); color: var(--rank-1-fg); }\n.kx-rank.r2 { background: var(--rank-2-bg); color: var(--rank-2-fg); }\n.kx-rank.r3 { background: var(--rank-3-bg); color: var(--rank-3-fg); }\n.kx-rank.you { background: var(--kraya-ink); color: white; border-color: var(--kraya-red);}\n\n/* ─── Bid row (leaderboard line) ─────────────────────────────────────── */\n.kx-bid-row {\n  display: grid;\n  grid-template-columns: 28px 1fr auto auto;\n  gap: 14px; align-items: center;\n  padding: 12px 14px;\n  border-radius: 8px;\n  transition: background var(--dur-fast) var(--ease-out);\n}\n.kx-bid-row + .kx-bid-row { margin-top: 4px; }\n.kx-bid-row:hover { background: var(--bg-canvas); }\n.kx-bid-row.you {\n  background: var(--kraya-red-soft);\n  border: 1px solid var(--kraya-red-tint);\n}\n.kx-bid-row .vendor { font: 500 14px/1.2 var(--font-sans); color: var(--fg-1); }\n.kx-bid-row .meta { font: 400 11px/1 var(--font-mono); color: var(--fg-3); margin-top: 3px; }\n.kx-bid-row .bid { font: 600 16px/1 var(--font-mono); color: var(--fg-1); font-variant-numeric: tabular-nums; }\n.kx-bid-row .delta { font: 500 11px/1 var(--font-mono); color: var(--success); margin-left: 8px; }\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; font-family: var(--font-sans); background: var(--kraya-paper); color: var(--fg-1); font-size: 14px;}\n\n  /* ─── App shell ─── */\n  .app { display: grid; grid-template-rows: 56px 1fr; min-height: 100vh;}\n  .topbar { display: flex; align-items: center; padding: 0 22px; gap: 18px;\n            background: var(--bg-surface); border-bottom: 1px solid var(--border-subtle);}\n  .topbar img { height: 22px;}\n  .topbar .tag {\n    background: var(--kraya-red-soft); color: var(--kraya-red); padding: 4px 10px; border-radius: 999px;\n    font: 600 11px/1 var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase;\n  }\n  .role-toggle { margin-left: auto; display: flex; background: var(--bg-canvas); border: 1px solid var(--border-default); border-radius: 8px; padding: 3px;}\n  .role-toggle button { background: transparent; border: none; padding: 6px 12px; border-radius: 6px; font: 500 12px/1 var(--font-sans); cursor: pointer; color: var(--fg-2);}\n  .role-toggle button.active { background: var(--kraya-ink); color: white;}\n  .avatar { width: 32px; height: 32px; border-radius: 999px; background: var(--neutral-200); color: var(--fg-2); display: grid; place-items: center; font: 600 12px/1 var(--font-sans);}\n  .breadcrumb { font: 500 12px/1 var(--font-sans); color: var(--fg-3);}\n  .breadcrumb strong { color: var(--fg-1); font-weight: 600;}\n\n  /* ─── Screens ─── */\n  .screen { display: none; padding: 28px 36px 64px;}\n  .screen.active { display: block;}\n\n  /* Auction hero — shared between buyer + vendor */\n  .auction-hero { display: grid; grid-template-columns: 1fr auto; gap: 32px; padding: 24px 28px; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 14px; box-shadow: var(--shadow-1); margin-bottom: 20px; align-items: center;}\n  .auction-hero .id { font: 500 11px/1 var(--font-mono); color: var(--fg-3); margin-bottom: 6px;}\n  .auction-hero h1 { font: 700 30px/1.1 var(--font-sans); letter-spacing: -0.02em; margin: 0 0 6px;}\n  .auction-hero .sub { font: 400 13px/1.4 var(--font-sans); color: var(--fg-2);}\n  .auction-hero .badges { display: flex; gap: 8px; margin-top: 14px;}\n  .auction-hero .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px; font: 600 11px/1.2 var(--font-sans);}\n  .b-live { background: var(--auction-live-soft); color: var(--auction-live);}\n  .b-info { background: var(--info-soft); color: var(--info);}\n  .b-warning { background: var(--warning-soft); color: var(--warning);}\n\n  /* Timer block at the right of hero */\n  .timer-block { text-align: center; padding-left: 32px; border-left: 1px solid var(--border-subtle);}\n  .timer-block .lbl { font: 600 10px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 8px;}\n  .timer-block .kx-timer { font-size: 48px;}\n  .timer-block .units { display: flex; justify-content: center; gap: 22px; margin-top: 6px; font: 500 10px/1 var(--font-mono); color: var(--fg-3); letter-spacing: 0.2em;}\n\n  /* Stats row */\n  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px;}\n  .stat { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 16px 18px;}\n  .stat .lbl { font: 600 10px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px;}\n  .stat .v { font: 700 22px/1 var(--font-sans); color: var(--fg-1); letter-spacing: -0.01em; display: flex; align-items: baseline; gap: 6px;}\n  .stat .v .u { font: 500 13px/1 var(--font-sans); color: var(--fg-2);}\n  .stat .delta { font: 500 11px/1 var(--font-mono); color: var(--success); margin-top: 6px;}\n  .stat .delta.down { color: var(--danger);}\n  .stat.brand { background: var(--kraya-ink); border-color: var(--kraya-ink-2);}\n  .stat.brand .lbl, .stat.brand .v, .stat.brand .v .u { color: white;}\n  .stat.brand .lbl { color: rgba(255,255,255,0.6);}\n\n  /* Two-col layout */\n  .grid-2 { display: grid; grid-template-columns: 1.65fr 1fr; gap: 20px;}\n\n  /* Card primitive */\n  .card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; box-shadow: var(--shadow-1); overflow: hidden;}\n  .card-h { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border-subtle);}\n  .card-h h3 { font: 600 13px/1 var(--font-sans); margin: 0;}\n  .card-h .meta { font: 500 11px/1 var(--font-mono); color: var(--fg-3);}\n  .card-h .live { color: var(--auction-live); display: inline-flex; align-items: center; gap: 6px;}\n  .card-b { padding: 6px;}\n  .card-b.pad { padding: 18px;}\n\n  /* Ticker (live event feed) */\n  .tick { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; padding: 9px 14px; border-radius: 6px;}\n  .tick:hover { background: var(--bg-canvas);}\n  .tick .when { font: 500 10px/1 var(--font-mono); color: var(--fg-3); width: 38px;}\n  .tick .who { font: 500 12px/1.3 var(--font-sans); color: var(--fg-1);}\n  .tick .who .ev { color: var(--fg-2); font-weight: 400;}\n  .tick .price { font: 600 12px/1 var(--font-mono); color: var(--fg-1); font-variant-numeric: tabular-nums;}\n  .tick.bid .price { color: var(--success);}\n  .tick.ext { background: var(--warning-soft);}\n  .tick.ext .who .ev { color: var(--auction-extended);}\n\n  /* Chart wrap */\n  .chart-wrap { position: relative; height: 140px; padding: 8px;}\n  .chart-wrap svg { width: 100%; height: 100%; display: block;}\n\n  /* Buttons */\n  .btn { font: 600 13px/1 var(--font-sans); border-radius: 8px; padding: 9px 14px; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px;}\n  .btn-primary { background: var(--kraya-red); color: white; box-shadow: var(--shadow-1);}\n  .btn-primary:hover { background: var(--kraya-red-hover);}\n  .btn-outline { background: var(--bg-surface); color: var(--fg-1); border-color: var(--border-default);}\n  .btn-outline:hover { background: var(--bg-subtle);}\n  .btn-danger { background: var(--bg-surface); color: var(--danger); border-color: #F0B6B0;}\n  .btn-danger:hover { background: var(--danger-soft);}\n\n  /* ─── Vendor view: position ribbon ─── */\n  .position-card {\n    background: var(--bg-surface); border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-2);\n    padding: 24px; display: grid; grid-template-columns: auto 1fr auto; gap: 22px; align-items: center; margin-bottom: 20px;\n    position: relative; overflow: hidden;\n  }\n  .position-card::before { content: \"\"; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--auction-extended);}\n  .position-card.rank1::before { background: var(--success);}\n  .pos-rank { font: 700 72px/0.9 var(--font-sans); letter-spacing: -0.04em; color: var(--auction-extended);}\n  .pos-rank sup { font: 600 20px/1 var(--font-sans); vertical-align: top; margin-left: 4px;}\n  .pos-card.rank1 .pos-rank { color: var(--success);}\n  .pos-meta .lbl { font: 600 10px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px;}\n  .pos-meta h2 { font: 700 22px/1.1 var(--font-sans); margin: 0 0 6px; letter-spacing: -0.01em;}\n  .pos-meta .gap { font: 500 14px/1.4 var(--font-sans); color: var(--fg-2);}\n  .pos-meta .gap strong { color: var(--auction-extended); font-family: var(--font-mono); font-weight: 600;}\n\n  /* Bid input panel (vendor view) */\n  .bid-panel { background: var(--bg-surface); border-radius: 14px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-1); padding: 22px; }\n  .bid-panel h3 { font: 600 14px/1 var(--font-sans); margin: 0 0 14px;}\n  .bid-input-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 12px;}\n  .bid-currency { display: grid; place-items: center; padding: 0 14px; background: var(--bg-canvas); border: 1.5px solid var(--border-default); border-right: none; border-radius: 8px 0 0 8px; font: 600 18px/1 var(--font-sans); color: var(--fg-2);}\n  .bid-input { flex: 1; padding: 14px 16px; border: 1.5px solid var(--border-default); border-left: none; border-radius: 0 8px 8px 0;\n    font: 600 22px/1 var(--font-mono); color: var(--fg-1); background: var(--bg-surface); outline: none; font-variant-numeric: tabular-nums; min-width: 0;}\n  .bid-input:focus { border-color: var(--kraya-red); box-shadow: 0 0 0 3px var(--kraya-red-soft);}\n  .quick { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px;}\n  .qb { padding: 8px 6px; border-radius: 6px; background: var(--bg-canvas); border: 1px solid var(--border-default); cursor: pointer; font: 500 12px/1.4 var(--font-sans); color: var(--fg-1);}\n  .qb:hover { background: var(--bg-subtle);}\n  .qb .qb-lbl { font-size: 10px; color: var(--fg-3); display: block; margin-bottom: 3px;}\n  .submit-row { display: flex; gap: 8px;}\n  .submit-row .btn-primary { flex: 1; justify-content: center; padding: 13px 18px; font-size: 14px;}\n  .meta-foot { display: flex; justify-content: space-between; margin-top: 14px; font: 400 11px/1.4 var(--font-sans); color: var(--fg-3);}\n  .meta-foot strong { color: var(--fg-1);}\n\n  /* Banner (extension etc) */\n  .banner { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; font: 500 13px/1.3 var(--font-sans); margin-bottom: 16px;}\n  .banner.extend { background: var(--warning-soft); color: var(--warning); border: 1px solid #F3D9A5;}\n  .banner.extend .ico { width: 28px; height: 28px; border-radius: 999px; background: var(--warning); color: white; display: grid; place-items: center; flex-shrink: 0;}\n  .banner strong { font-weight: 700;}\n  .banner .right { margin-left: auto; font: 600 12px/1 var(--font-mono);}\n\n  /* Setup form */\n  .setup { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px;}\n  .setup-form { background: var(--bg-surface); border-radius: 12px; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-1); padding: 24px;}\n  .setup-form h3 { font: 600 14px/1 var(--font-sans); margin: 0 0 4px;}\n  .setup-form .sub { font: 500 11px/1 var(--font-mono); color: var(--fg-3); margin-bottom: 18px;}\n  .setup-form .grp { paddin
