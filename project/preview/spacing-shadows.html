<!-- @dsCard group="Spacing" -->
<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 32px 24px; background: var(--kraya-paper); font-family: var(--font-sans);}
  .row { display: flex; gap: 24px; }
  .col { flex: 1; display: flex; flex-direction: column; align-items: center; }
  .box { width: 120px; height: 90px; background: var(--kraya-white); border-radius: 10px; }
  .lbl { font: 500 11px/1.4 var(--font-mono); color: var(--fg-3); margin-top: 14px; text-align: center;}
  .lbl strong { color: var(--fg-1); display: block; font-family: var(--font-sans); font-weight: 600; margin-bottom: 2px;}
</style>
</head><body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow: var(--shadow-1)"></div><div class="lbl"><strong>shadow-1</strong>resting / hairline</div></div>
    <div class="col"><div class="box" style="box-shadow: var(--shadow-2)"></div><div class="lbl"><strong>shadow-2</strong>card / lifted</div></div>
    <div class="col"><div class="box" style="box-shadow: var(--shadow-3)"></div><div class="lbl"><strong>shadow-3</strong>popover / menu</div></div>
    <div class="col"><div class="box" style="box-shadow: var(--shadow-4)"></div><div class="lbl"><strong>shadow-4</strong>modal / dialog</div></div>
  </div>
</body></html>
