<!-- @dsCard group="Spacing" -->
<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--kraya-paper); font-family: var(--font-sans);}
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .box { width: 100px; height: 80px; background: var(--kraya-ink); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px;}
  .box span { font: 500 11px/1 var(--font-mono); color: rgba(255,255,255,0.7); }
  .lbl { text-align: center; font: 500 11px/1.4 var(--font-mono); color: var(--fg-3); margin-top: 8px;}
  .col { display: flex; flex-direction: column; align-items: center;}
</style>
</head><body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius: var(--radius-xs)"><span>4</span></div><div class="lbl">xs · 4px</div></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-sm)"><span>6</span></div><div class="lbl">sm · 6px</div></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-md)"><span>8</span></div><div class="lbl">md · 8px</div></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-lg)"><span>12</span></div><div class="lbl">lg · 12px</div></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-xl)"><span>16</span></div><div class="lbl">xl · 16px</div></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-pill); width: 130px"><span>999</span></div><div class="lbl">pill · 999</div></div>
  </div>
</body></html>
