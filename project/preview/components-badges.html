<!-- @dsCard group="Components" -->
<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--kraya-paper); font-family: var(--font-sans);}
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px;}
  .row:last-child { margin: 0;}
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font: 600 12px/1.3 var(--font-sans);}
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .b-success { background: var(--success-soft); color: var(--success);}
  .b-warning { background: var(--warning-soft); color: var(--warning);}
  .b-danger  { background: var(--danger-soft);  color: var(--danger);}
  .b-info    { background: var(--info-soft);    color: var(--info);}
  .b-neutral { background: var(--neutral-100);  color: var(--neutral-700);}
  .b-brand   { background: var(--kraya-red-soft); color: var(--kraya-red);}

  .chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
          background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: 999px;
          font: 500 13px/1 var(--font-sans); color: var(--fg-1); }
  .chip .x { color: var(--fg-3); font-weight: 600; }
</style>
</head><body>
  <div class="row">
    <span class="badge b-success"><span class="dot"></span>Approved</span>
    <span class="badge b-warning"><span class="dot"></span>Pending</span>
    <span class="badge b-danger"><span class="dot"></span>Rejected</span>
    <span class="badge b-info"><span class="dot"></span>In Review</span>
    <span class="badge b-neutral">Draft</span>
    <span class="badge b-brand">RFQ Open</span>
  </div>
  <div class="row">
    <span class="chip">Steel · 304L <span class="x">×</span></span>
    <span class="chip">Mumbai vendors <span class="x">×</span></span>
    <span class="chip">Above ₹5,00,000 <span class="x">×</span></span>
    <span class="chip">Compliance verified <span class="x">×</span></span>
  </div>
</body></html>
