<!-- @dsCard group="Components" -->
<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--kraya-paper); font-family: var(--font-sans);}
  .menu { width: 260px; background: var(--bg-surface); border-radius: 12px; box-shadow: var(--shadow-3); border: 1px solid var(--border-subtle); padding: 6px;}
  .item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 6px; font: 500 13px/1 var(--font-sans); color: var(--fg-1); cursor: pointer;}
  .item:hover { background: var(--bg-subtle);}
  .item.active { background: var(--kraya-red-soft); color: var(--kraya-red);}
  .item .ico { width: 16px; height: 16px; color: var(--fg-3); display: grid; place-items: center;}
  .item.active .ico { color: var(--kraya-red);}
  .sep { height: 1px; background: var(--border-subtle); margin: 6px 4px;}
  .sec { padding: 8px 10px 4px; font: 500 10px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3);}
  .kbd { margin-left: auto; font: 500 10px/1 var(--font-mono); color: var(--fg-3); padding: 2px 5px; border: 1px solid var(--border-subtle); border-radius: 4px; background: var(--bg-canvas);}

  .layout { display: flex; gap: 24px; align-items: flex-start; }
  .demo { flex: 1; padding-top: 24px; }
  .demo h5 { font: 500 11px/1 var(--font-mono); color: var(--fg-3); margin: 0 0 12px;}
</style>
</head><body>
  <div class="layout">
    <div class="menu">
      <div class="sec">Procurement</div>
      <div class="item"><svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h8"/></svg>Dashboard</div>
      <div class="item active"><svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="3.5" width="11" height="9" rx="1"/><path d="M5 6.5h6M5 9.5h4"/></svg>Purchase Orders<span class="kbd">⌘P</span></div>
      <div class="item"><svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="2.2"/><path d="M3 13c0-2.5 2.2-4 5-4s5 1.5 5 4"/></svg>Vendors</div>
      <div class="item"><svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13V6l5-3 5 3v7"/><path d="M6 13V9h4v4"/></svg>RFQs</div>
      <div class="sep"></div>
      <div class="sec">Account</div>
      <div class="item"><svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2"/></svg>Settings</div>
    </div>
  </div>
</body></html>
