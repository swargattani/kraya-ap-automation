<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--kraya-paper); font-family: var(--font-sans);}
  .row { display: flex; align-items: center; gap: 16px; padding: 6px 0; }
  .label { width: 70px; font: 500 12px/1 var(--font-mono); color: var(--fg-3); }
  .px    { width: 50px; font: 500 12px/1 var(--font-mono); color: var(--fg-2); }
  .bar { background: var(--kraya-red); height: 12px; border-radius: 4px; }
</style>
</head><body>
  <div class="row"><div class="label">space-1</div><div class="px">4px</div><div class="bar" style="width: 4px"></div></div>
  <div class="row"><div class="label">space-2</div><div class="px">8px</div><div class="bar" style="width: 8px"></div></div>
  <div class="row"><div class="label">space-3</div><div class="px">12px</div><div class="bar" style="width: 12px"></div></div>
  <div class="row"><div class="label">space-4</div><div class="px">16px</div><div class="bar" style="width: 16px"></div></div>
  <div class="row"><div class="label">space-5</div><div class="px">20px</div><div class="bar" style="width: 20px"></div></div>
  <div class="row"><div class="label">space-6</div><div class="px">24px</div><div class="bar" style="width: 24px"></div></div>
  <div class="row"><div class="label">space-8</div><div class="px">32px</div><div class="bar" style="width: 32px"></div></div>
  <div class="row"><div class="label">space-10</div><div class="px">40px</div><div class="bar" style="width: 40px"></div></div>
  <div class="row"><div class="label">space-12</div><div class="px">48px</div><div class="bar" style="width: 48px"></div></div>
  <div class="row"><div class="label">space-16</div><div class="px">64px</div><div class="bar" style="width: 64px"></div></div>
  <div class="row"><div class="label">space-20</div><div class="px">80px</div><div class="bar" style="width: 80px"></div></div>
  <div class="row"><div class="label">space-24</div><div class="px">96px</div><div class="bar" style="width: 96px"></div></div>
</body></html>
