<!-- @dsCard group="Auctions" -->
<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../auction.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--kraya-paper); font-family: var(--font-sans); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; }
  .badge { display: inline-flex; align-items: center; gap: 7px; padding: 5px 11px; border-radius: 999px;
           font: 600 12px/1.3 var(--font-sans); }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .b-setup    { background: var(--neutral-100); color: var(--neutral-700); }
  .b-open     { background: var(--info-soft); color: var(--info); }
  .b-live     { background: var(--auction-live-soft); color: var(--auction-live); padding-left: 8px; }
  .b-extended { background: var(--warning-soft); color: var(--warning); }
  .b-closing  { background: var(--danger-soft); color: var(--danger); }
  .b-awarded  { background: var(--success-soft); color: var(--success); }
  .b-cancelled{ background: var(--neutral-100); color: var(--neutral-500); text-decoration: line-through; }
  .ann { font: 500 11px/1 var(--font-mono); color: var(--fg-3); margin-top: 16px;}
</style>
</head><body>
  <div class="row">
    <span class="badge b-setup"><span class="dot"></span>Setup</span>
    <span class="badge b-open"><span class="dot"></span>Open · 4d</span>
    <span class="badge b-live"><span class="kx-live-dot"></span>Live</span>
    <span class="badge b-extended"><span class="dot"></span>Extended · 2 min</span>
    <span class="badge b-closing"><span class="dot"></span>Closing in 38s</span>
    <span class="badge b-awarded"><span class="dot"></span>Awarded</span>
    <span class="badge b-cancelled">Cancelled</span>
  </div>
  <div class="ann">Lifecycle: <strong>Setup → Open → Live → Closing / Extended → Awarded</strong></div>
</body></html>
