<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--kraya-paper); }
  .card { width: 700px; height: 220px; display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .panel { display: flex; align-items: center; justify-content: center; padding: 32px; }
  .panel.light { background: var(--kraya-paper); }
  .panel.dark  { background: var(--kraya-ink); }
  .panel img { max-width: 100%; height: auto; }
  .swap-dark { filter: invert(1) brightness(1.6); } /* black PNG on dark bg */
</style>
</head>
<body>
  <div class="card">
    <div class="panel light"><img src="../assets/logo/kraya-logo-black.png" alt="kraya wordmark" style="width:240px" /></div>
    <div class="panel dark"><img src="../assets/logo/kraya-logo-black.png" class="swap-dark" alt="kraya wordmark inverted" style="width:240px" /></div>
  </div>
</body>
</html>
