<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--kraya-paper); font-family: var(--font-sans);}
  .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; align-items: stretch;}
  .panel { background: var(--bg-surface); border-radius: 12px; padding: 18px; border: 1px solid var(--border-subtle);
           background-image: radial-gradient(circle at 1px 1px, rgba(15,12,10,0.12) 1px, transparent 0);
           background-size: 16px 16px; background-position: 0 0;}
  .panel h5 { font: 500 11px/1 var(--font-mono); color: var(--fg-3); margin: 0 0 12px; letter-spacing: 0.04em;}
  .quote { font: 700 22px/1.15 var(--font-sans); letter-spacing: -0.02em; color: var(--fg-1); text-wrap: balance;}
  .quote em { font-style: normal; color: var(--kraya-red);}
  .bullets { font: 400 13px/1.5 var(--font-sans); color: var(--fg-2); margin: 0; padding-left: 18px;}
  .bullets li { margin-bottom: 5px;}
  .bullets li::marker { color: var(--kraya-red);}
</style>
</head><body>
  <div class="wrap">
    <div class="panel">
      <h5>VOICE — A SAMPLE</h5>
      <div class="quote">Change the way <em>you procure</em>. Streamline sourcing, save time, and reduce costs with Kraya's smart solutions.</div>
    </div>
    <div class="panel">
      <h5>TONE RULES</h5>
      <ul class="bullets">
        <li>Confident, outcome-driven, B2B-pragmatic</li>
        <li>You · Your · Kraya (third person)</li>
        <li>Title Case headlines · sentence case body</li>
        <li>No emoji, no exclamation marks</li>
      </ul>
    </div>
  </div>
</body></html>
